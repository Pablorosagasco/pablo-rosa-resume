name: Compile resume PDF

on:
  push:
    branches: [main]
    paths:
      - "Pablo_Rosa_resume.tex"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Pablo_Rosa_resume.tex

      - name: Rename output
        run: mv Pablo_Rosa_resume.pdf PabloRosaResume.pdf

      - name: Commit compiled PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PabloRosaResume.pdf
          git diff --cached --quiet || git commit -m "Auto-compile resume PDF"
          git push
